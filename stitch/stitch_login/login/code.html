<div class="fixed inset-0 pointer-events-none">

<div class="mb-6 relative h-24 w-24">
<div class="absolute inset-0 bg-primary rounded-xl rotate-6 opacity-20"></div>

</div>
</div>

                The Kinetic Playground

<p class="text-on-surface-variant font-medium">Ready to jump back into the flow?</p>

<!-- Username Field -->
<div class="space-y-2">
<label class="font-headline font-bold text-sm tracking-wide text-on-surface-variant ml-1" for="username">USERNAME OR EMAIL</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant/60" data-icon="alternate_email">alternate_email</span>
<input class="w-full bg-surface-container-high border-none rounded-lg py-4 pl-12 pr-4 text-on-surface font-medium placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" id="username" placeholder="hello@playground.com" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="font-headline font-bold text-sm tracking-wide text-on-surface-variant" for="password">PASSWORD</label>
<a class="text-xs font-bold text-primary hover:text-primary-dim transition-colors" href="#">FORGOT?</a>
</div>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-on-surface-variant/60" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-high border-none rounded-lg py-4 pl-12 pr-12 text-on-surface font-medium placeholder:text-on-surface-variant/40 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-on-surface-variant/60 hover:text-primary" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Let's Go Button -->
<button class="w-full group relative overflow-hidden bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-lg py-4 rounded-full shadow-lg hover:shadow-primary/20 active:scale-95 transition-all duration-300" type="submit">
<span class="relative z-10 flex items-center justify-center gap-2">
                        Let's Go!
                        <span class="material-symbols-outlined text-2xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</span>
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
</button>
</form>
<!-- Social/Other Sign-ins (High-Energy Layout) -->
<div class="mt-8 pt-8 relative">
<div class="absolute top-0 left-0 right-0 h-px bg-gradient-to-r from-transparent via-outline-variant/20 to-transparent"></div>
<div class="flex flex-col items-center gap-4">
<p class="text-xs font-bold text-on-surface-variant tracking-[0.2em]">OR JUMP IN WITH</p>
<div class="flex gap-4">
<button class="h-12 w-12 bg-surface-container-highest rounded-full flex items-center justify-center hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary" data-icon="hub">hub</span>
</button>
<button class="h-12 w-12 bg-surface-container-highest rounded-full flex items-center justify-center hover:bg-secondary/10 transition-colors">
<span class="material-symbols-outlined text-secondary" data-icon="token">token</span>
</button>
<button class="h-12 w-12 bg-surface-container-highest rounded-full flex items-center justify-center hover:bg-tertiary/10 transition-colors">
<span class="material-symbols-outlined text-tertiary" data-icon="workspaces">workspaces</span>

</div>
</div>
</div>

<p class="font-medium text-on-surface-variant">

</a>
</p>

<div class="bg-tertiary-container/30 px-6 py-3 rounded-full flex items-center gap-3 border border-tertiary/10">

<span class="material-symbols-outlined text-on-tertiary text-sm" data-icon="celebration" data-weight="fill" style="font-variation-settings: 'FILL' 1;">celebration</span>

<span class="text-xs font-bold text-on-tertiary-container tracking-wide uppercase">Employee of the month: Sarah J.</span>
