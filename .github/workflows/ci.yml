name: CI / CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Backend — lint + type-check + tests
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_password
          MYSQL_DATABASE: hrms_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -ptest_password"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create test .env
        run: |
          cat > .env << 'EOF'
          APP_NAME=HRMS
          APP_ENV=test
          DEBUG=false
          DATABASE_URL=mysql+aiomysql://root:test_password@localhost:3306/hrms_test
          REDIS_URL=redis://localhost:6379/0
          JWT_SECRET_KEY=ci_test_secret_key_32_chars_long_x
          JWT_ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=60
          REFRESH_TOKEN_EXPIRE_DAYS=30
          ENCRYPTION_KEY=dGVzdF9lbmNyeXB0aW9uX2tleV8zMmNoYXJzIT09
          GROQ_API_KEY=
          ANTHROPIC_API_KEY=
          FIREBASE_CREDENTIALS_PATH=./firebase-credentials.json
          CORS_ORIGINS=http://localhost:3000
          TIMEZONE=Asia/Kolkata
          S3_ENDPOINT_URL=
          S3_ACCESS_KEY=
          S3_SECRET_KEY=
          EOF

      - name: Run Alembic migrations (test DB)
        run: alembic upgrade head

      - name: Verify app imports cleanly
        run: python -c "from app.main import app; print('App loaded OK')"

  # ────────────────────────────────────────────────────────────────────────────
  # Frontend — type-check + build
  # ────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8001/api/v1

  # ────────────────────────────────────────────────────────────────────────────
  # Docker build validation — ensures images build without error
  # ────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t hrms-api ./backend

      - name: Build frontend image
        run: docker build -t hrms-web ./frontend
