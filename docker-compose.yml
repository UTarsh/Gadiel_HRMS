version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Gadiel HRMS — production docker-compose
#
# Database : Aiven MySQL  (external managed service)
# Cache    : Upstash Redis (external managed service)
#
# Services running here:
#   api      — FastAPI backend  (port 8001)
#   frontend — React SPA        (served by nginx on port 80)
#   nginx    — Reverse proxy    (port 80)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend API ──────────────────────────────────────────────────────────────
  api:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env.production
    ports:
      - "8001:8001"
    volumes:
      - uploads:/app/uploads
      - ./secrets/firebase-credentials.json:/app/secrets/firebase-credentials.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Frontend (React SPA served by nginx) ─────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - api

  # ── Nginx reverse proxy (HTTPS enabled) ──────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.ssl.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - frontend

volumes:
  uploads:
